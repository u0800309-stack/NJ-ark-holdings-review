name: Codex fix HUD overflow and pie depth

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - name: Fix HUD chart overflow and 3D donut likeness
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let t = fs.readFileSync(path, 'utf8');

          const overrides = `.piewrap{min-height:520px;align-content:start;perspective:980px;gap:0}.piewrap:before{top:86px;width:min(390px,92%);transform:translateX(-50%) rotateX(68deg);opacity:.95}.pie{width:min(340px,88%);margin:36px auto -18px;transform:rotateX(58deg) translateY(-8px);transform-origin:center center;box-shadow:inset 0 0 0 5px rgba(151,225,255,.95),inset 0 0 0 76px #061530,0 18px 0 #02102a,0 26px 0 rgba(30,98,210,.62),0 0 0 10px rgba(25,139,255,.16),0 0 38px rgba(43,157,255,.9),0 46px 42px rgba(0,0,0,.5)}.pie:before{inset:-20px;border:2px solid rgba(36,159,255,.48);box-shadow:0 0 30px rgba(32,148,255,.65),inset 0 0 22px rgba(32,148,255,.22)}.pie:after{inset:31%;background:radial-gradient(circle at 45% 32%,#0c2857,#020711 72%);box-shadow:inset 0 0 28px rgba(0,0,0,.88),0 0 24px rgba(37,162,255,.64)}.legend{position:relative;z-index:3;margin-top:10px}.s3d{min-height:440px;padding:34px 18px 74px;place-items:end center;overflow:hidden}.city3d{gap:24px;max-width:none;transform-origin:center bottom}@keyframes citySpin{0%,100%{transform:scale(.72) rotateX(5deg) rotateY(-14deg) translateZ(0)}50%{transform:scale(.72) rotateX(5deg) rotateY(14deg) translateZ(0)}}.tower{flex:0 0 100px;min-width:100px;height:300px}.tower:before{bottom:-14px;width:122px;height:34px}.tower:after{bottom:-22px;width:148px;height:28px}.bar3{width:58px;min-height:82px}.bar3:before{width:27px}.bar3:after{top:-31px;width:68px;height:34px}.building-mark{width:44px;height:44px;font-size:11px}.tower span{bottom:-76px;min-width:112px;padding:8px 9px;font-size:18px}`;

          if (!t.includes('/* codex-hud-fit-20260517 */')) {
            const anchor = '.table{overflow:auto;max-height:560px;';
            if (!t.includes(anchor)) throw new Error('table CSS anchor not found');
            t = t.replace(anchor, `/* codex-hud-fit-20260517 */${overrides}${anchor}`);
          }

          t = t.replace(/Math\.max\(118,Math\.round\(r\.value\/max\*326\)\)/g, 'Math.max(88,Math.round(r.value/max*255))');

          const logPath = 'VERSION_LOG.md';
          const entry = `## 2026-05-17 - precise-hud-fit-and-3d-donut\n- Fixed: 重大持股 3D 結構圖 now scales the whole city stage inside the card instead of overflowing.\n- Fixed: 持股占比圓餅圖 now uses a tilted, thicker neon 3D donut treatment closer to the reference.\n- Preserved: CSV import behavior, manual 方舟複盤 generation, target-price tools, and 10-section review output.\n\n`;
          fs.writeFileSync(path, t);
          let log = fs.existsSync(logPath) ? fs.readFileSync(logPath, 'utf8') : '';
          if (!log.includes('precise-hud-fit-and-3d-donut')) fs.writeFileSync(logPath, entry + log);
          NODE
      - name: Commit precise HUD fit
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html VERSION_LOG.md
          git commit -m "Fix HUD chart overflow and 3D donut depth"
          git push
