name: Codex HUD holdings and review flow

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - name: Apply HUD visual style and review flow behavior
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let t = fs.readFileSync(path, 'utf8');

          t = t.replace(/\.empty\{display:grid;min-height:280px;place-items:center;border:1px dashed #b8c0bb;border-radius:8px;color:var\(--muted\);text-align:center;padding:24px\}/,
            `.empty{display:block;min-height:168px;border:1px dashed #b8c0bb;border-radius:8px;color:var(--muted);text-align:left;padding:18px}.review-brief{display:grid;gap:12px}.review-brief h3{margin:0;color:#183c4a;font-size:20px}.brief-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.brief-card{border:1px solid var(--line);border-radius:8px;background:#fff;padding:12px}.brief-card span{display:block;color:var(--muted);font-size:12px}.brief-card strong{display:block;margin-top:7px;color:var(--ink);font-size:22px}.brief-note{margin:0;color:#53656d;line-height:1.65}`);

          const hudCss = `.visuals{display:grid;grid-template-columns:minmax(360px,.82fr) minmax(520px,1.35fr);gap:14px;margin-bottom:18px}.pie-card,.structure-card{position:relative;padding:24px 24px 22px;border:1px solid rgba(48,152,255,.7);border-radius:8px;background:radial-gradient(circle at 50% 0,rgba(34,122,255,.22),transparent 36%),linear-gradient(180deg,#071b3c,#031126 68%,#020817);box-shadow:0 0 0 1px rgba(43,153,255,.2),0 18px 44px rgba(0,15,36,.42),inset 0 0 38px rgba(28,117,255,.18);overflow:hidden}.pie-card:before,.structure-card:before{content:"";position:absolute;inset:10px;border:1px solid rgba(35,145,255,.24);border-radius:6px;pointer-events:none}.pie-card h3,.structure-card h3{position:relative;margin:0 auto 22px;width:max-content;max-width:100%;padding:4px 56px 10px;font-size:25px;line-height:1.1;color:#f4f8ff;font-weight:950;text-shadow:0 0 14px rgba(55,166,255,.7);border-bottom:1px solid rgba(67,164,255,.5)}.pie-card h3:before,.structure-card h3:before{content:"";position:absolute;left:50%;bottom:-3px;width:88px;height:4px;transform:translateX(-50%);border-radius:99px;background:#1aa6ff;box-shadow:0 0 18px #1aa6ff}.card{padding:14px}.card h3{margin:0 0 10px;font-size:16px}.piewrap{position:relative;display:grid;grid-template-columns:1fr;gap:18px;align-items:center}.pie{justify-self:center;width:min(360px,92%);aspect-ratio:1;border-radius:50%;background:conic-gradient(var(--line) 0 100%);box-shadow:inset 0 0 0 5px rgba(128,202,255,.8),inset 0 0 0 88px #061633,0 0 0 10px rgba(34,143,255,.16),0 0 34px rgba(41,156,255,.72),0 24px 38px rgba(0,0,0,.38);filter:drop-shadow(0 16px 0 rgba(0,7,20,.35))}.pie:after{content:"";position:absolute}.legend{display:grid;gap:7px}.lrow{display:grid;grid-template-columns:18px minmax(0,1fr) auto;gap:12px;align-items:center;padding:10px 14px;border:1px solid rgba(72,159,255,.28);border-radius:8px;background:linear-gradient(90deg,rgba(21,100,210,.28),rgba(5,23,55,.62));font-size:14px;line-height:1.2;color:#eef6ff;box-shadow:inset 0 0 18px rgba(21,118,255,.12)}.lrow strong{font-size:19px;font-weight:950;color:#fff}.dot{width:17px;height:17px;border-radius:99px;background:var(--c);box-shadow:0 0 16px var(--c)}.s3d{min-height:520px;perspective:1500px;display:grid;place-items:end center;padding:54px 34px 54px;border-radius:8px;background:radial-gradient(circle at 50% 25%,rgba(33,120,255,.22),transparent 42%),linear-gradient(135deg,rgba(32,137,255,.18) 0 1px,transparent 1px),linear-gradient(45deg,rgba(48,195,255,.14) 0 1px,transparent 1px),linear-gradient(180deg,#061a3b,#020917 70%);background-size:auto,54px 54px,54px 54px,auto;box-shadow:inset 0 0 80px rgba(18,112,255,.22);overflow:hidden}.city3d{width:max-content;max-width:100%;display:flex;align-items:flex-end;justify-content:center;gap:46px;transform-style:preserve-3d;animation:citySpin 13s ease-in-out infinite;will-change:transform}@keyframes citySpin{0%,100%{transform:rotateX(5deg) rotateY(-18deg) translateZ(0)}50%{transform:rotateX(5deg) rotateY(18deg) translateZ(0)}}.tower{position:relative;flex:0 0 118px;min-width:118px;height:360px;display:flex;align-items:flex-end;justify-content:center;transform-style:preserve-3d}.tower:before{content:"";position:absolute;bottom:-16px;width:136px;height:36px;border:1px solid rgba(81,184,255,.85);border-radius:6px;background:linear-gradient(180deg,rgba(28,126,255,.45),rgba(4,18,42,.95));box-shadow:0 0 22px var(--c),0 18px 28px rgba(0,0,0,.38);transform:translateZ(22px) skewX(-8deg)}.bar3{position:relative;width:72px;min-height:92px;height:var(--h);transform-style:preserve-3d;transform:rotateY(-10deg);transform-origin:bottom center;background:linear-gradient(115deg,rgba(255,255,255,.7) 0 8%,rgba(75,195,255,.18) 9% 18%,transparent 19%),repeating-linear-gradient(0deg,rgba(119,213,255,.72) 0 2px,transparent 2px 22px),repeating-linear-gradient(90deg,rgba(127,215,255,.52) 0 2px,transparent 2px 18px),linear-gradient(180deg,color-mix(in srgb,var(--c),white 25%),var(--c) 58%,color-mix(in srgb,var(--c),black 55%));border:1px solid rgba(144,224,255,.75);box-shadow:0 0 24px var(--c),10px 18px 28px rgba(0,0,0,.35),inset 8px 0 18px rgba(255,255,255,.22);border-radius:3px}.bar3:before{content:"";position:absolute;left:100%;top:12px;width:34px;height:calc(100% - 12px);background:linear-gradient(90deg,rgba(0,0,0,.35),rgba(112,220,255,.12)),repeating-linear-gradient(0deg,rgba(138,226,255,.34) 0 2px,transparent 2px 22px),repeating-linear-gradient(90deg,rgba(99,195,255,.3) 0 2px,transparent 2px 14px),linear-gradient(180deg,var(--c),color-mix(in srgb,var(--c),black 55%));transform:skewY(26deg);transform-origin:left bottom;border:1px solid rgba(144,224,255,.38);border-left:0}.bar3:after{content:"";position:absolute;left:-2px;top:-38px;width:82px;height:42px;background:linear-gradient(145deg,rgba(255,255,255,.78),rgba(65,187,255,.14)),linear-gradient(180deg,color-mix(in srgb,var(--c),white 34%),color-mix(in srgb,var(--c),black 12%));transform:skewX(-45deg);transform-origin:left bottom;border:1px solid rgba(157,230,255,.62);border-radius:2px;box-shadow:0 0 20px var(--c)}.tower span{position:absolute;left:50%;bottom:-92px;min-width:134px;padding:9px 12px;border:1px solid rgba(91,187,255,.75);border-radius:6px;background:rgba(4,22,54,.82);box-shadow:0 0 18px var(--c);transform:translateX(-50%) skewX(-8deg);font-size:23px;font-weight:950;line-height:1.16;text-align:center;white-space:pre;color:#fff;text-shadow:0 0 14px var(--c)}`;
          const visualRe = /\.visuals\{[\s\S]*?\.tower span\{[\s\S]*?text-shadow:0 2px 0 rgba\(255,255,255,\.75\)\}|\.visuals\{[\s\S]*?\.tower span\{[\s\S]*?text-shadow:0 0 14px var\(--c\)\}/;
          if (!visualRe.test(t)) throw new Error('visual CSS block not found');
          t = t.replace(visualRe, hudCss);

          t = t.replace('function loadCsv(text){const t=parseCsv(text),hi=headRow(t);if(hi<0)return reset("找不到可辨識欄位，請確認 CSV 有代號、目前庫存、均價、最新價等欄位。");const idx=index(t[hi]);state.rows=t.slice(hi+1).map(r=>{const symbol=cell(r,idx.symbol).toUpperCase(),shares=toNum(cell(r,idx.shares)),avgCost=toNum(cell(r,idx.avgCost));let price=toNum(cell(r,idx.price))||avgCost;return{symbol,name:cell(r,idx.name)||symbol,sector:cell(r,idx.sector,"未分類"),shares,avgCost,price,thesis:cell(r,idx.thesis,"未填寫持有邏輯"),level:cell(r,idx.level,"未標記")}}).filter(r=>r.symbol&&r.shares>0);if(!state.rows.length)return reset("CSV 已讀取，但沒有有效持股資料。請確認目前庫存或可用庫存不是空白。");els.csvInput.value=text;generate()}',
          'function loadCsv(text,run=false){const t=parseCsv(text),hi=headRow(t);if(hi<0)return reset("找不到可辨識欄位，請確認 CSV 有代號、目前庫存、均價、最新價等欄位。");const idx=index(t[hi]);state.rows=t.slice(hi+1).map(r=>{const symbol=cell(r,idx.symbol).toUpperCase(),shares=toNum(cell(r,idx.shares)),avgCost=toNum(cell(r,idx.avgCost));let price=toNum(cell(r,idx.price))||avgCost;return{symbol,name:cell(r,idx.name)||symbol,sector:cell(r,idx.sector,"未分類"),shares,avgCost,price,thesis:cell(r,idx.thesis,"未填寫持有邏輯"),level:cell(r,idx.level,"未標記")}}).filter(r=>r.symbol&&r.shares>0);if(!state.rows.length)return reset("CSV 已讀取，但沒有有效持股資料。請確認目前庫存或可用庫存不是空白。");els.csvInput.value=text;run?generate():importPreview()}');

          t = t.replace('function generate(){if(!state.rows.length){const v=els.csvInput.value.trim();return v?loadCsv(v):reset("請先匯入或貼上持股庫存。")}const t=analyze(),s=summary(t);state.lastTotals=t;state.lastSummary=s;metrics(t,s);table();visuals();review(s,t);smart(s);stress();els.statusText.textContent="複盤完成";els.statusText.className="badge green";toast("方舟複盤已生成。")}function metrics',
          'function importPreview(){const t=analyze(),s=summary(t);state.lastTotals=t;state.lastSummary=s;metrics(t,s);table();visuals();smart(s);stress();els.reviewOutput.hidden=true;els.reviewOutput.innerHTML="";els.emptyState.hidden=false;els.emptyState.innerHTML=`<div class="review-brief"><h3>複盤重點整理</h3><div class="brief-grid"><div class="brief-card"><span>股票水位</span><strong>${pct(s.stockRatio)}</strong></div><div class="brief-card"><span>最大部位</span><strong>${s.largest?pct(s.largest.weight):"0%"}</strong></div><div class="brief-card"><span>需檢討</span><strong>${s.watch.length}</strong></div><div class="brief-card"><span>未實現損益</span><strong>${money(s.totalPnl)}</strong></div></div><p class="brief-note">CSV 已匯入。這裡先整理複盤前重點；要產生完整 10 段方舟複盤，請按右上角「生成方舟複盤」。</p></div>`;els.statusText.textContent="已匯入";els.statusText.className="badge blue";toast("CSV 已匯入，尚未生成方舟複盤。")}function generate(){if(!state.rows.length){const v=els.csvInput.value.trim();return v?loadCsv(v,true):reset("請先匯入或貼上持股庫存。")}const t=analyze(),s=summary(t);state.lastTotals=t;state.lastSummary=s;metrics(t,s);table();visuals();review(s,t);smart(s);stress();els.statusText.textContent="複盤完成";els.statusText.className="badge green";toast("方舟複盤已生成。")}function metrics');

          t = t.replace('function color(i){return["#183c4a","#d7a93e","#456aa8","#437f53","#bd4f48","#147a78","#7d5b12","#66757c"][i%8]}',
            'function color(i){return["#2a9dff","#ffc83d","#5f8dff","#45e0c3","#ff7f8c","#72ddf7","#d89d24","#7a8cff"][i%8]}');

          t = t.replace('[els.cashInput,els.usdCashInput,els.usdRateInput,els.maxInvested,els.singleLimit,els.highGain].forEach(x=>x.onchange=()=>{if(state.rows.length)generate()});',
            '[els.cashInput,els.usdCashInput,els.usdRateInput,els.maxInvested,els.singleLimit,els.highGain].forEach(x=>x.onchange=()=>{if(state.rows.length)importPreview()});');

          const logPath = 'VERSION_LOG.md';
          const entry = `## 2026-05-17 - hud-holdings-and-manual-review-generation\n- Scope: Changed CSV import so it only imports and refreshes holdings visuals; full 方舟複盤 now generates only after pressing 生成方舟複盤.\n- Scope: Replaced the blank pre-review area with 複盤重點整理 cards.\n- Scope: Restyled 持股占比圓餅圖 and 重大持股 3D 結構圖 into a dark neon HUD style similar to the provided reference.\n- Preserved: CSV parsing, holdings table, target-price collection, and 10-section review output.\n\n`;
          fs.writeFileSync(path, t);
          let log = fs.existsSync(logPath) ? fs.readFileSync(logPath, 'utf8') : '';
          if (!log.includes('hud-holdings-and-manual-review-generation')) fs.writeFileSync(logPath, entry + log);
          NODE
      - name: Commit HUD patch
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html VERSION_LOG.md
          git commit -m "Apply HUD holdings style and manual review generation"
          git push
