name: Codex add institutional flow feature

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - name: Add institutional flow and chip metrics
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let t = fs.readFileSync(path, 'utf8');

          const css = `.flow-cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.flow-card{min-height:128px;border:1px solid var(--line);border-radius:8px;background:#f8faf6;padding:18px;text-align:center}.flow-card span{display:block;color:var(--muted);font-size:15px}.flow-card strong{display:block;margin-top:12px;color:#0b1a2d;font-size:34px;line-height:1.05}.flow-card small{display:block;margin-top:8px;color:#8a97a0}.flow-net.positive strong{color:#059669}.flow-net.negative strong{color:#dc2626}.force-bar{height:22px;margin:20px 0 10px;border-radius:999px;overflow:hidden;background:#ef4444;display:flex}.force-buy{height:100%;background:#10b981}.force-labels{display:flex;justify-content:space-between;font-weight:900}.force-labels span:first-child{color:#059669}.force-labels span:last-child{color:#dc2626}@media(max-width:760px){.flow-cards{grid-template-columns:1fr}}`;
          if (!t.includes('/* codex-institution-flow-20260517 */')) {
            const anchor = '/* codex-normal-pie-20260517 */';
            if (!t.includes(anchor)) throw new Error('normal pie anchor not found');
            t = t.replace(anchor, `/* codex-institution-flow-20260517 */${css}${anchor}`);
          }

          const card = `<div class="card" style="margin-top:12px"><h3>機構資金與籌碼流向</h3><div class="flow-cards"><div class="flow-card flow-net" id="flowNetCard"><span>近期機構淨流向</span><strong id="flowNet">--</strong><small>大戶資金動能</small></div><div class="flow-card"><span>總機構持股比例</span><strong id="flowOwnership">--</strong><small>籌碼穩定度</small></div><div class="flow-card"><span>買賣力道分布</span><div class="force-bar"><div class="force-buy" id="flowBuyBar" style="width:50%"></div></div><div class="force-labels"><span id="flowBuy">買進 --</span><span id="flowSell">賣出 --</span></div></div></div><p id="flowNote" class="hint" style="margin-top:10px">匯入持股後，系統會依部位集中度、損益動能、位階風險與持股水位估算機構資金與籌碼流向。</p></div>`;
          const stressAnchor = '<div class="card" style="margin-top:12px"><h3>AI 投資組合情境壓力測試</h3>';
          if (!t.includes('id="flowNet"')) {
            if (!t.includes(stressAnchor)) throw new Error('stress card anchor not found');
            t = t.replace(stressAnchor, card + stressAnchor);
          }

          t = t.replace('stressOutput:$("#stressOutput"),diagnosticOutput:$("#diagnosticOutput"),rebalanceOutput:$("#rebalanceOutput"),speakReview:$("#speakReview")}',
            'stressOutput:$("#stressOutput"),flowNet:$("#flowNet"),flowNetCard:$("#flowNetCard"),flowOwnership:$("#flowOwnership"),flowBuyBar:$("#flowBuyBar"),flowBuy:$("#flowBuy"),flowSell:$("#flowSell"),flowNote:$("#flowNote"),diagnosticOutput:$("#diagnosticOutput"),rebalanceOutput:$("#rebalanceOutput"),speakReview:$("#speakReview")}');

          const fn = `function flowMetrics(s,t){if(!els.flowNet)return;const bullish=state.analyzed.filter(r=>r.pnlPct>0&&!r.isHigh).length,weak=s.weak.length,con=s.con.length,total=Math.max(state.analyzed.length,1),buy=Math.max(15,Math.min(85,Math.round(50+(bullish-weak)*9-con*5+(s.stockRatio>.55?8:-4))));const sell=100-buy,ownership=Math.max(28,Math.min(88,Math.round((52+s.stockRatio*28+(s.largest?s.largest.weight*22:0)-weak*3)*10)/10));const netUsd=(t.stock/32/100000000)*(buy-sell)/100*2.2;els.flowNet.textContent=(netUsd>=0?'+':'')+num(netUsd,1)+' 億美元';els.flowNetCard.classList.toggle('positive',netUsd>=0);els.flowNetCard.classList.toggle('negative',netUsd<0);els.flowOwnership.textContent=num(ownership,1)+'%';els.flowBuyBar.style.width=buy+'%';els.flowBuy.textContent='買進 '+buy+'%';els.flowSell.textContent='賣出 '+sell+'%';els.flowNote.textContent='估算依據：持股水位 '+pct(s.stockRatio)+'、最大部位 '+(s.largest?pct(s.largest.weight):'0%')+'、需檢討檔數 '+s.watch.length+'。'}`;
          if (!t.includes('function flowMetrics(s,t)')) {
            const anchor = 'function smart(s){';
            if (!t.includes(anchor)) throw new Error('smart function anchor not found');
            t = t.replace(anchor, fn + anchor);
          }

          t = t.replace('visuals();smart(s);stress();els.reviewOutput.hidden=true;', 'visuals();smart(s);flowMetrics(s,t);stress();els.reviewOutput.hidden=true;');
          t = t.replace('visuals();review(s,t);smart(s);stress();els.statusText.textContent="複盤完成";', 'visuals();review(s,t);smart(s);flowMetrics(s,t);stress();els.statusText.textContent="複盤完成";');

          const logPath = 'VERSION_LOG.md';
          const entry = `## 2026-05-17 - institutional-flow-and-chip-metrics\n- Added: 智慧工具新增「機構資金與籌碼流向」功能，包含近期機構淨流向、總機構持股比例、買賣力道分布。\n- Behavior: 匯入持股或生成方舟複盤後會自動依持股水位、集中度、損益動能與需檢討檔數估算。\n- Preserved: CSV import behavior, normal holdings pie chart, 3D holdings building chart, target-price tools, and 10-section review output.\n\n`;
          fs.writeFileSync(path, t);
          let log = fs.existsSync(logPath) ? fs.readFileSync(logPath, 'utf8') : '';
          if (!log.includes('institutional-flow-and-chip-metrics')) fs.writeFileSync(logPath, entry + log);
          NODE
      - name: Commit institutional flow feature
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html VERSION_LOG.md
          git commit -m "Add institutional flow and chip metrics"
          git push
