name: Codex VIX rescue

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rescue-vix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Wait for other generated patch workflows
        run: sleep 35
      - name: Apply VIX rescue
        run: node .github/scripts/codex-vix-rescue-20260518.js
      - name: Commit VIX rescue
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Fix VIX fallback display"
          git push
