name: Codex match HUD reference style

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - name: Match provided HUD visual reference
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let t = fs.readFileSync(path, 'utf8');

          const refCss = `.visuals{display:grid;grid-template-columns:minmax(360px,.78fr) minmax(620px,1.42fr);gap:12px;margin-bottom:18px}.pie-card,.structure-card{position:relative;padding:22px 24px 24px;border:1px solid rgba(31,145,255,.92);border-radius:10px;background:radial-gradient(circle at 50% 0,rgba(29,118,255,.24),transparent 30%),radial-gradient(circle at 50% 55%,rgba(13,84,186,.18),transparent 48%),linear-gradient(180deg,#061a3d 0%,#03122c 58%,#010712 100%);box-shadow:0 0 0 1px rgba(15,93,218,.42),0 0 28px rgba(16,139,255,.4),inset 0 0 42px rgba(22,104,255,.2);overflow:hidden}.pie-card:before,.structure-card:before{content:"";position:absolute;inset:9px;border:1px solid rgba(42,154,255,.34);border-radius:8px;clip-path:polygon(0 4%,30% 4%,33% 0,67% 0,70% 4%,100% 4%,100% 96%,70% 96%,67% 100%,33% 100%,30% 96%,0 96%);pointer-events:none}.pie-card:after,.structure-card:after{content:"";position:absolute;left:26px;right:26px;bottom:20px;height:1px;background:linear-gradient(90deg,transparent,rgba(36,151,255,.62),transparent);opacity:.85}.pie-card h3,.structure-card h3{position:relative;z-index:1;margin:0 auto 22px;width:max-content;max-width:100%;padding:8px 72px 12px;font-size:27px;letter-spacing:0;color:#fff;font-weight:950;text-shadow:0 0 16px rgba(82,178,255,.92),0 2px 0 rgba(0,0,0,.45);background:linear-gradient(90deg,transparent,rgba(22,82,164,.42),transparent);border-bottom:1px solid rgba(89,174,255,.48)}.pie-card h3:before,.structure-card h3:before{content:"";position:absolute;left:50%;bottom:-4px;width:96px;height:4px;transform:translateX(-50%);border-radius:99px;background:#14a8ff;box-shadow:0 0 22px #14a8ff}.pie-card h3:after,.structure-card h3:after{content:"";position:absolute;left:14px;right:14px;top:50%;height:1px;background:linear-gradient(90deg,rgba(75,169,255,.65),transparent 18%,transparent 82%,rgba(75,169,255,.65));opacity:.7}.card{padding:14px}.card h3{margin:0 0 10px;font-size:16px}.piewrap{position:relative;z-index:1;display:grid;grid-template-columns:1fr;gap:22px}.piewrap:before{content:"";position:absolute;left:50%;top:18px;width:min(390px,88%);aspect-ratio:1;transform:translateX(-50%) rotateX(64deg);border-radius:50%;border:2px solid rgba(22,165,255,.55);box-shadow:0 0 28px rgba(26,158,255,.65),inset 0 0 22px rgba(22,165,255,.25);pointer-events:none}.pie{position:relative;justify-self:center;width:min(350px,92%);aspect-ratio:1;border-radius:50%;background:conic-gradient(var(--line) 0 100%);box-shadow:inset 0 0 0 4px rgba(147,222,255,.9),inset 0 0 0 84px #061530,0 13px 0 #02102a,0 0 0 10px rgba(25,139,255,.14),0 0 35px rgba(43,157,255,.85),0 34px 44px rgba(0,0,0,.5);filter:saturate(1.18)}.pie:before{content:"";position:absolute;inset:-16px;border-radius:50%;border:1px solid rgba(32,148,255,.4);box-shadow:0 0 28px rgba(32,148,255,.48)}.pie:after{content:"";position:absolute;inset:31%;border-radius:50%;background:radial-gradient(circle at 45% 35%,#0a2149,#020711 70%);box-shadow:inset 0 0 26px rgba(0,0,0,.82),0 0 22px rgba(37,162,255,.55)}.legend{display:grid;gap:6px}.lrow{display:grid;grid-template-columns:19px minmax(0,1fr) auto;gap:12px;align-items:center;min-height:42px;padding:8px 14px;border:1px solid rgba(56,152,255,.34);border-radius:8px;background:linear-gradient(90deg,rgba(22,100,218,.34),rgba(3,18,45,.72));box-shadow:inset 0 0 18px rgba(31,124,255,.12);font-size:14px;color:#f3f8ff}.lrow span:nth-child(2){overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.lrow strong{font-size:19px;font-weight:950;color:#fff;text-shadow:0 0 12px rgba(77,178,255,.55)}.dot{width:18px;height:18px;border-radius:99px;background:var(--c);box-shadow:0 0 15px var(--c),inset 0 0 7px rgba(255,255,255,.55)}.s3d{position:relative;min-height:548px;perspective:1550px;display:grid;place-items:end center;padding:66px 36px 64px;border-radius:8px;background:radial-gradient(circle at 46% 30%,rgba(18,91,204,.22),transparent 38%),linear-gradient(135deg,rgba(26,119,255,.18) 0 1px,transparent 1px),linear-gradient(45deg,rgba(36,209,255,.12) 0 1px,transparent 1px),linear-gradient(180deg,#071d43,#021026 68%,#010711);background-size:auto,58px 58px,58px 58px,auto;box-shadow:inset 0 0 90px rgba(16,112,255,.24);overflow:hidden}.s3d:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 82% 18%,rgba(31,151,255,.26),transparent 18%),linear-gradient(90deg,transparent 72%,rgba(43,161,255,.09));pointer-events:none}.s3d:after{content:"";position:absolute;right:36px;top:58px;width:130px;height:94px;border:1px solid rgba(62,160,255,.28);border-radius:8px;background:linear-gradient(180deg,rgba(43,150,255,.08),rgba(43,150,255,.02));box-shadow:inset 0 0 24px rgba(40,136,255,.12);opacity:.9}.city3d{position:relative;z-index:1;width:max-content;max-width:100%;display:flex;align-items:flex-end;justify-content:center;gap:46px;transform-style:preserve-3d;animation:citySpin 13s ease-in-out infinite;will-change:transform}@keyframes citySpin{0%,100%{transform:rotateX(5deg) rotateY(-16deg) translateZ(0)}50%{transform:rotateX(5deg) rotateY(16deg) translateZ(0)}}.tower{position:relative;flex:0 0 126px;min-width:126px;height:372px;display:flex;align-items:flex-end;justify-content:center;transform-style:preserve-3d}.tower:before{content:"";position:absolute;bottom:-18px;width:152px;height:46px;border:1px solid rgba(84,191,255,.92);border-radius:7px;background:linear-gradient(180deg,rgba(23,117,246,.48),rgba(2,13,33,.96));box-shadow:0 0 24px var(--c),0 20px 32px rgba(0,0,0,.48);transform:translateZ(24px) skewX(-9deg)}.tower:after{content:"";position:absolute;bottom:-27px;width:184px;height:35px;border-radius:50%;background:radial-gradient(ellipse,rgba(30,153,255,.32),transparent 72%);transform:rotateX(72deg);filter:blur(.4px)}.bar3{position:relative;width:74px;min-height:96px;height:var(--h);transform-style:preserve-3d;transform:rotateY(-10deg);transform-origin:bottom center;background:linear-gradient(115deg,rgba(255,255,255,.76) 0 8%,rgba(78,201,255,.18) 9% 19%,transparent 20%),repeating-linear-gradient(0deg,rgba(130,221,255,.78) 0 2px,transparent 2px 21px),repeating-linear-gradient(90deg,rgba(130,221,255,.6) 0 2px,transparent 2px 18px),linear-gradient(180deg,color-mix(in srgb,var(--c),white 28%),var(--c) 58%,color-mix(in srgb,var(--c),black 58%));border:1px solid rgba(166,232,255,.82);box-shadow:0 0 24px var(--c),12px 19px 30px rgba(0,0,0,.45),inset 8px 0 18px rgba(255,255,255,.24);border-radius:4px}.bar3:before{content:"";position:absolute;left:100%;top:12px;width:36px;height:calc(100% - 12px);background:linear-gradient(90deg,rgba(0,0,0,.42),rgba(112,220,255,.12)),repeating-linear-gradient(0deg,rgba(138,226,255,.34) 0 2px,transparent 2px 21px),repeating-linear-gradient(90deg,rgba(99,195,255,.3) 0 2px,transparent 2px 14px),linear-gradient(180deg,var(--c),color-mix(in srgb,var(--c),black 58%));transform:skewY(26deg);transform-origin:left bottom;border:1px solid rgba(144,224,255,.42);border-left:0}.bar3:after{content:"";position:absolute;left:-2px;top:-40px;width:86px;height:44px;background:linear-gradient(145deg,rgba(255,255,255,.8),rgba(70,190,255,.16)),linear-gradient(180deg,color-mix(in srgb,var(--c),white 36%),color-mix(in srgb,var(--c),black 12%));transform:skewX(-45deg);transform-origin:left bottom;border:1px solid rgba(170,235,255,.68);border-radius:3px;box-shadow:0 0 20px var(--c)}.building-mark{position:absolute;left:50%;top:25%;transform:translateX(-50%);width:52px;height:52px;border:2px solid rgba(222,247,255,.88);border-radius:50%;display:grid;place-items:center;color:#fff;font-size:12px;font-style:normal;font-weight:950;letter-spacing:0;text-shadow:0 0 10px #fff;background:rgba(15,92,205,.38);box-shadow:0 0 18px var(--c)}.tower span{position:absolute;left:50%;bottom:-98px;min-width:148px;padding:10px 12px;border:1px solid rgba(91,187,255,.82);border-radius:7px;background:linear-gradient(180deg,rgba(15,73,151,.88),rgba(3,18,47,.94));box-shadow:0 0 20px var(--c),inset 0 0 18px rgba(60,170,255,.15);transform:translateX(-50%) skewX(-8deg);font-size:22px;font-weight:950;line-height:1.16;text-align:center;white-space:pre;color:#fff;text-shadow:0 0 14px var(--c)}`;

          const cssRe = /\.visuals\{[\s\S]*?\.tower span\{[\s\S]*?text-shadow:0 0 14px var\(--c\)\}/;
          if (!cssRe.test(t)) throw new Error('HUD CSS block not found');
          t = t.replace(cssRe, refCss);

          t = t.replace(/rows\.slice\(0,4\)\.map\(\(r,i\)=>`<div class="tower"><div class="bar3" style="--h:\$\{Math\.max\(96,Math\.round\(r\.value\/max\*310\)\)\}px;--c:\$\{color\(i\)\}"><\/div><span>\$\{esc\(r\.symbol\)\}\\n\$\{pct\(r\.weight\)\}<\/span><\/div>`\)\.join\(""\)/,
            'rows.slice(0,4).map((r,i)=>`<div class="tower"><div class="bar3" style="--h:${Math.max(118,Math.round(r.value/max*326))}px;--c:${color(i)}"><i class="building-mark">${esc(r.symbol).slice(0,4)}</i></div><span>${esc(r.symbol)}\\n${pct(r.weight)}</span></div>`).join("")');

          const logPath = 'VERSION_LOG.md';
          const entry = `## 2026-05-17 - direct-reference-hud-visual-match\n- Scope: Pushed 持股占比圓餅圖 and 重大持股 3D 結構圖 closer to the provided dark-blue neon HUD reference.\n- Details: Added angular HUD frames, title glow bars, stronger 3D donut depth, neon legend rows, city-grid background, building badges, glowing bases, and sharper tower labels.\n- Preserved: CSV import behavior, manual 方舟複盤 generation, holdings table, target-price tools, and 10-section review output.\n\n`;
          fs.writeFileSync(path, t);
          let log = fs.existsSync(logPath) ? fs.readFileSync(logPath, 'utf8') : '';
          if (!log.includes('direct-reference-hud-visual-match')) fs.writeFileSync(logPath, entry + log);
          NODE
      - name: Commit reference HUD match
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html VERSION_LOG.md
          git commit -m "Match holdings visuals to dark neon HUD reference"
          git push
