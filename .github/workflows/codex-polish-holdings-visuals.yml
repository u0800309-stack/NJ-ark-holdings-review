name: Codex polish holdings visuals

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - name: Polish holdings pie and 3D buildings
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let t = fs.readFileSync(path, 'utf8');
          const visualCss = `.visuals{display:grid;grid-template-columns:minmax(360px,1fr) minmax(430px,1.05fr);gap:20px;margin-bottom:18px}.pie-card,.structure-card{position:relative;padding:28px 28px 24px;border:1px solid rgba(18,33,48,.1);border-radius:18px;background:rgba(255,255,255,.96);box-shadow:0 18px 46px rgba(15,32,46,.16)}.card{padding:14px}.pie-card h3,.structure-card h3{position:relative;margin:0 0 24px;padding-left:24px;font-size:26px;line-height:1.1;color:#0c1830;font-weight:950}.pie-card h3:before,.structure-card h3:before{content:"";position:absolute;left:0;top:2px;width:7px;height:34px;border-radius:8px;background:#1468d8;box-shadow:0 8px 18px rgba(20,104,216,.22)}.card h3{margin:0 0 10px;font-size:16px}.piewrap{display:grid;grid-template-columns:minmax(250px,1fr) minmax(220px,.78fr);gap:28px;align-items:center}.pie{width:min(330px,100%);aspect-ratio:1;border-radius:50%;background:conic-gradient(var(--line) 0 100%);box-shadow:inset 0 0 0 6px rgba(255,255,255,.92),inset 0 0 0 86px rgba(255,255,255,.98),0 24px 42px rgba(16,29,42,.18);filter:drop-shadow(0 3px 0 rgba(255,255,255,.7))}.legend{display:grid;gap:0;align-self:stretch;align-content:center}.lrow{display:grid;grid-template-columns:16px minmax(0,1fr) auto;gap:14px;align-items:center;padding:12px 4px;border-bottom:1px solid rgba(15,32,46,.14);font-size:19px;line-height:1.15;color:#0c1830}.lrow strong{font-size:22px;font-weight:950}.dot{width:14px;height:14px;border-radius:99px;background:var(--c);box-shadow:0 5px 12px rgba(15,32,46,.18)}.s3d{min-height:510px;perspective:1400px;display:grid;place-items:end center;padding:52px 34px 42px;border-radius:18px;background:radial-gradient(circle at 28% 12%,rgba(255,255,255,.96),rgba(244,249,255,.92) 34%,rgba(224,238,252,.9)),linear-gradient(180deg,rgba(255,255,255,.72),rgba(213,232,250,.66));box-shadow:inset 0 -1px 0 rgba(255,255,255,.9);overflow:hidden}.city3d{width:max-content;max-width:100%;display:flex;align-items:flex-end;justify-content:center;gap:54px;transform-style:preserve-3d;animation:citySpin 13s ease-in-out infinite;will-change:transform}@keyframes citySpin{0%,100%{transform:rotateX(3deg) rotateY(-18deg) translateZ(0)}50%{transform:rotateX(3deg) rotateY(18deg) translateZ(0)}}.tower{position:relative;flex:0 0 118px;min-width:118px;height:360px;display:flex;align-items:flex-end;justify-content:center;transform-style:preserve-3d}.tower:before{content:"";position:absolute;bottom:-9px;width:108px;height:17px;border-radius:2px;background:linear-gradient(180deg,rgba(255,255,255,.45),rgba(0,0,0,.16)),var(--c);box-shadow:0 9px 22px rgba(10,25,38,.26);transform:translateZ(18px)}.bar3{position:relative;width:70px;min-height:86px;height:var(--h);transform-style:preserve-3d;transform:rotateY(-10deg);transform-origin:bottom center;background:linear-gradient(115deg,rgba(255,255,255,.62) 0 9%,rgba(255,255,255,.14) 10% 18%,transparent 19%),repeating-linear-gradient(0deg,rgba(255,255,255,.52) 0 3px,transparent 3px 22px),repeating-linear-gradient(90deg,rgba(255,255,255,.46) 0 3px,transparent 3px 18px),linear-gradient(180deg,color-mix(in srgb,var(--c),white 20%),var(--c) 52%,color-mix(in srgb,var(--c),black 38%));border:1px solid rgba(7,26,47,.28);box-shadow:10px 18px 28px rgba(9,24,38,.28),inset 8px 0 18px rgba(255,255,255,.18);border-radius:2px}.bar3:before{content:"";position:absolute;left:100%;top:12px;width:34px;height:calc(100% - 12px);background:linear-gradient(90deg,rgba(0,0,0,.25),rgba(255,255,255,.1)),repeating-linear-gradient(0deg,rgba(255,255,255,.28) 0 2px,transparent 2px 22px),repeating-linear-gradient(90deg,rgba(255,255,255,.2) 0 2px,transparent 2px 14px),linear-gradient(180deg,var(--c),color-mix(in srgb,var(--c),black 44%));transform:skewY(26deg);transform-origin:left bottom;border:1px solid rgba(7,26,47,.22);border-left:0}.bar3:after{content:"";position:absolute;left:-2px;top:-38px;width:82px;height:42px;background:linear-gradient(145deg,rgba(255,255,255,.65),rgba(255,255,255,.08)),linear-gradient(180deg,color-mix(in srgb,var(--c),white 28%),color-mix(in srgb,var(--c),black 12%));transform:skewX(-45deg);transform-origin:left bottom;border:1px solid rgba(7,26,47,.24);border-radius:2px;box-shadow:0 8px 18px rgba(9,24,38,.18)}.tower span{position:absolute;left:50%;bottom:-84px;transform:translateX(-50%);font-size:24px;font-weight:950;line-height:1.15;text-align:center;white-space:pre;color:#0b1830;text-shadow:0 2px 0 rgba(255,255,255,.75)}`;
          const cssRe = /\.visuals\{[\s\S]*?\.tower span\{[\s\S]*?text-shadow:0 1px 0 rgba\(255,255,255,\.75\)\}/;
          if (!cssRe.test(t)) throw new Error('visual CSS block not found');
          t = t.replace(cssRe, visualCss);
          t = t.replace('rows.slice(0,6).map((r,i)=>`<div class="tower"><div class="bar3" style="--h:${Math.max(52,Math.round(r.value/max*230))}px;--c:${color(i)}"></div><span>${esc(r.symbol)} ${pct(r.weight)}</span></div>`).join("")', 'rows.slice(0,4).map((r,i)=>`<div class="tower"><div class="bar3" style="--h:${Math.max(96,Math.round(r.value/max*310))}px;--c:${color(i)}"></div><span>${esc(r.symbol)}\\n${pct(r.weight)}</span></div>`).join("")');
          fs.writeFileSync(path, t);
          const logPath = 'VERSION_LOG.md';
          const entry = `## 2026-05-17 - reference-style-holdings-visuals\n- Scope: Restyled 持股占比圓餅圖 into a large white-card donut chart with right-side separated legend.\n- Scope: Restyled 重大持股 3D 結構圖 into four glass building towers with base, roof, window grid, blue stage, and rotation animation.\n- Preserved: CSV import, 方舟複盤 10 sections, 智慧工具 target-price collection and analysis.\n\n`;
          let log = fs.existsSync(logPath) ? fs.readFileSync(logPath, 'utf8') : '';
          if (!log.includes('reference-style-holdings-visuals')) fs.writeFileSync(logPath, entry + log);
          NODE
      - name: Commit polish
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html VERSION_LOG.md
          git commit -m "Polish holdings pie and 3D building visuals"
          git push
