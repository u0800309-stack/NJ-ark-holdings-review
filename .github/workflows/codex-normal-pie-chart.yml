name: Codex normal pie chart

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - name: Restore normal holdings pie chart
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let t = fs.readFileSync(path, 'utf8');

          const overrides = `.piewrap{min-height:auto;perspective:none;align-content:center;gap:18px}.piewrap:before,.piewrap:after{display:none}.pie{width:min(320px,88%);margin:8px auto 8px;transform:none;aspect-ratio:1;border-radius:50%;background:conic-gradient(var(--line) 0 100%);box-shadow:0 0 0 4px rgba(96,181,255,.42),0 18px 34px rgba(0,0,0,.32);filter:none;overflow:hidden}.pie:before,.pie:after{display:none}.legend{margin-top:8px}`;

          const existing = /\/\* codex-normal-pie-20260517 \*\/[\s\S]*?\/\* codex-donut-reference-mode-20260517 \*\//;
          if (existing.test(t)) {
            t = t.replace(existing, `/* codex-normal-pie-20260517 */${overrides}/* codex-donut-reference-mode-20260517 */`);
          } else {
            const anchor = '/* codex-donut-reference-mode-20260517 */';
            if (!t.includes(anchor)) throw new Error('Donut reference CSS anchor not found');
            t = t.replace(anchor, `/* codex-normal-pie-20260517 */${overrides}${anchor}`);
          }

          const logPath = 'VERSION_LOG.md';
          const entry = `## 2026-05-17 - normal-holdings-pie-chart\n- Changed: 持股占比圖改回一般圓餅圖，移除 3D 甜甜圈、中心洞與厚度層。\n- Preserved: CSV import behavior, manual 方舟複盤 generation, 3D holdings building chart, target-price tools, and 10-section review output.\n\n`;
          fs.writeFileSync(path, t);
          let log = fs.existsSync(logPath) ? fs.readFileSync(logPath, 'utf8') : '';
          if (!log.includes('normal-holdings-pie-chart')) fs.writeFileSync(logPath, entry + log);
          NODE
      - name: Commit normal pie chart
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html VERSION_LOG.md
          git commit -m "Restore normal holdings pie chart"
          git push
